version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cti_db
    environment:
      POSTGRES_DB: cti_db
      POSTGRES_USER: cti_user
      POSTGRES_PASSWORD: cti_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cti_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Celery Broker)
  redis:
    image: redis:7-alpine
    container_name: cti_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch (Optional)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: cti_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Django Application
  web:
    build: .
    container_name: cti_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 cti_project.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://cti_user:cti_password@db:5432/cti_db
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_HOSTS=elasticsearch:9200
      - SECRET_KEY=your-secret-key-here
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/cti/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Celery Worker
  celery:
    build: .
    container_name: cti_celery
    command: celery -A cti_project worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://cti_user:cti_password@db:5432/cti_db
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_HOSTS=elasticsearch:9200
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - db
      - redis
      - web

  # Celery Beat (Scheduler)
  celery-beat:
    build: .
    container_name: cti_celery_beat
    command: celery -A cti_project beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://cti_user:cti_password@db:5432/cti_db
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_HOSTS=elasticsearch:9200
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - db
      - redis
      - web

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cti_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  elasticsearch_data:
  static_volume:
  media_volume:

networks:
  default:
    name: cti_network
