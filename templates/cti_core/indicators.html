{% extends "base.html" %}

{% block title %}Threat Indicators - CTI Module{% endblock %}

{% block content %}
<div class="space-y-6">
    <div>
        <h1 class="text-3xl font-bold text-gray-900">Threat Indicators</h1>
        <p class="text-gray-600 mt-2">All ingested indicators of compromise (IOCs)</p>
    </div>
    
    <!-- Filters -->
    <div class="bg-white rounded-lg shadow p-6">
        <form hx-get="{% url 'cti_core:indicators_list' %}" hx-target="#indicators-table" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <!-- Type Filter -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Type</label>
                    <select name="type" hx-trigger="change" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                        <option value="">All Types</option>
                        {% for value, label in indicator_types %}
                        <option value="{{ value }}" {% if request.GET.type == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Severity Filter -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Severity</label>
                    <select name="severity" hx-trigger="change" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                        <option value="">All Severities</option>
                        {% for value, label in severities %}
                        <option value="{{ value }}" {% if request.GET.severity == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Search -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                    <input type="text" name="q" placeholder="Search indicators..." 
                           value="{{ request.GET.q }}"
                           hx-trigger="keyup changed delay:500ms"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                </div>
                
                <!-- Stats -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Total</label>
                    <div class="px-3 py-2 bg-gray-100 rounded-lg font-semibold">{{ total_count }}</div>
                </div>
            </div>
        </form>
    </div>
    
    <!-- Indicators Table -->
    <div id="indicators-table" hx-get="{% url 'cti_core:indicators_list' %}" hx-trigger="load">
        <div class="text-center py-8 text-gray-500">Loading indicators...</div>
    </div>
</div>
{% endblock %}
