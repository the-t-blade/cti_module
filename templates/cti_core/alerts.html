{% extends "base.html" %}

{% block title %}Alerts - CTI Module{% endblock %}

{% block content %}
<div class="space-y-6">
    <div>
        <h1 class="text-3xl font-bold text-gray-900 text-white">Threat Alerts</h1>
        <p class="text-gray-600 mt-2">Real-time alerts generated by the AI correlation engine</p>
    </div>
    
    <!-- Filters -->
    <div class="bg-white rounded-lg shadow p-6">
        <form hx-get="{% url 'cti_core:alerts_list' %}" hx-target="#alerts-table" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Status Filter -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select name="status" hx-trigger="change" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                        <option value="">All Statuses</option>
                        {% for value, label in statuses %}
                        <option value="{{ value }}" {% if request.GET.status == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Severity Filter -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Severity</label>
                    <select name="severity" hx-trigger="change" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                        <option value="">All Severities</option>
                        {% for value, label in severities %}
                        <option value="{{ value }}" {% if request.GET.severity == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Search -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                    <input type="text" name="q" placeholder="Search alerts..." 
                           value="{{ request.GET.q }}"
                           hx-trigger="keyup changed delay:500ms"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                </div>
            </div>
        </form>
    </div>
    
    <!-- Alerts Table -->
    <div id="alerts-table" hx-get="{% url 'cti_core:alerts_list' %}" hx-trigger="load">
        <div class="text-center py-8 text-gray-500">Loading alerts...</div>
    </div>
</div>
{% endblock %}
