<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Zimbabwe CERT | CTI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #0a0a1a 100%);
        }
        .glass-card {
            background: rgba(15, 25, 35, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .glow-button {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            transition: all 0.3s ease;
        }
        .glow-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
            border-color: #06b6d4;
        }
        .cyber-dots {
            background-image: radial-gradient(rgba(56, 189, 248, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="cyber-dots">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-card rounded-2xl p-8 w-full max-w-md">
            <!-- Logo & Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 shadow-lg mb-4">
                    <span class="text-4xl">🛡️</span>
                </div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    Zimbabwe CERT
                </h1>
                <p class="text-gray-400 mt-2 text-sm">AI-Powered Threat Intelligence Platform</p>
            </div>
            
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                {% if form.non_field_errors %}
                <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4">
                    <p class="text-red-400 text-sm">{{ form.non_field_errors.0 }}</p>
                </div>
                {% endif %}
                
                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </span>
                        <input type="text" name="username" id="id_username" required
                               class="w-full pl-10 pr-4 py-3 bg-gray-900/50 border border-gray-700 rounded-xl focus:outline-none focus:border-cyan-500 input-glow text-white placeholder-gray-500"
                               placeholder="Enter your username">
                    </div>
                </div>
                
                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </span>
                        <input type="password" name="password" id="id_password" required
                               class="w-full pl-10 pr-4 py-3 bg-gray-900/50 border border-gray-700 rounded-xl focus:outline-none focus:border-cyan-500 input-glow text-white placeholder-gray-500"
                               placeholder="Enter your password">
                    </div>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="glow-button w-full py-3 rounded-xl font-semibold text-white transition-all duration-300">
                    Sign In
                </button>
            </form>
            
            <!-- System Status -->
            <div class="mt-6 flex items-center justify-center space-x-2 text-xs text-gray-500">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span>System Operational | v2.0</span>
            </div>
            
        
            </div>
        </div>
    </div>
</body>
</html>
